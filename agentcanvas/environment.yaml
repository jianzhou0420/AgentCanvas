# AgentCanvas general-purpose environment (ADR-020)
# Python 3.10 + modern PyTorch + ML stack for the web backend and all
# non-Habitat nodesets.  Habitat-Sim stays in the vlnce env (Python 3.8).
#
# Create:  conda env create -f agentcanvas/environment-agentcanvas.yaml
# Update:  conda env update -f agentcanvas/environment-agentcanvas.yaml --prune
name: agentcanvas
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pytorch=2.5.*
  - torchvision=0.20.*
  - torchaudio=2.5.*
  - pytorch-cuda=12.1

  # Core scientific stack
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - pillow>=10.0
  - networkx>=3.1

  # Frontend toolchain (Vite + React build) — bundled so install works on
  # machines without a recent system-wide node.
  - nodejs>=20

  # System
  - pip

  - pip:
      # Web backend framework (see backend/requirements.txt for details)
      - -r backend/requirements.txt

      # ML / AI libraries
      - transformers>=4.40
      - accelerate>=0.30
      - safetensors>=0.4
      - segment-anything>=1.0

      # Development
      - pytest>=7.0
      - pre-commit
