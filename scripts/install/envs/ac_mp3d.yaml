name: ac-mp3d
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults
dependencies:
  # Python version — 3.9 balances modern features with pybind11/MatterSim compatibility
  - python=3.9

  # C++ runtime (required for MatterSim C++ extensions)
  - libstdcxx-ng>=12.0.0

  # Build tools for compiling MatterSim from source
  - cmake>=3.10        # MatterSim requires CMake >= 3.10
  - make
  - pybind11           # Python/C++ bindings used by MatterSim

  # Core numerical / vision
  - numpy>=1.24.0,<2.0  # torch 2.1.0 was compiled against numpy 1.x
  - scipy
  - Pillow             # Image encoding (panoramic frames), mirrors habitat.py usage
  - tqdm

  # Graph / navigation utilities
  - networkx>=3.0

  # Utilities
  - attrs
  - jsonlines

  # Pip itself (required to avoid conda nag about pip-installed deps)
  - pip

  # Pip dependencies (packages not available or needing exact versions via conda)
  - pip:
      # OpenCV — MatterSim uses cv2 for image processing; pip wheel avoids conda Qt conflicts
      - opencv-python>=4.8.0,<4.11  # 4.11+ requires numpy>=2, incompatible with torch 2.1

      # PyTorch with CUDA 11.8 (modern GPU baseline, RTX 30xx / 40xx)
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch==2.1.0+cu118
      - torchvision==0.16.0+cu118

      # AgentCanvas server mode (matches ac-vlnce env pattern)
      - fastapi[standard]>=0.115.0
      - pydantic>=2.10.0
      - pydantic-settings>=2.6.0
      - python-dotenv>=1.0.1
      - httpx>=0.28.0

      # Development
      - pre-commit
