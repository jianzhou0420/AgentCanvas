name: ac-smartway
# SmartWay (IROS 2025) conda env spec.
# Side-experiment port; not PortBench v1 (author-relationship constraint).
# Mirrors upstream SmartWay-Code @ daa2dd8 README.md install steps
# (see workspace/nodesets/_upstream/smartway-code/fetch_upstream.sh).
channels:
  - aihabitat
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # ── Python ────────────────────────────────────────────────────────
  # SmartWay README pins 3.8.20 to align with habitat-sim 0.1.7 + RAM+.
  - python=3.8.20

  # ── C++ runtime (fixes CXXABI_1.3.15 — same as ac-vlnce env) ─────────
  - libstdcxx-ng>=12.0.0

  # ── Habitat simulator (server, 0.1.7 binary lock) ──────────────────
  # Identical binary as the ac-vlnce env; SmartWay's waypoint predictor's
  # depth encoder import chain (VlnResnetDepthEncoder ← vlnce_baselines
  # ← habitat) requires habitat-sim 0.1.7.
  - habitat-sim=0.1.7=py3.8_headless_linux_856d4b08c1a2632626bf0d205bf46471a99502b7

  # numpy < 1.24 because habitat-sim 0.1.7 uses np.float (removed 1.24+).
  - numpy=1.23.5
  - scipy=1.10.1
  - networkx=3.1
  - tqdm
  - attrs
  - numba
  - imageio
  - imageio-ffmpeg

  # ── Generic data deps ──────────────────────────────────────────────
  - lmdb
  - python-lmdb
  - quaternion
  - websockets
  - jsonlines
  - msgpack-numpy
  - yacs
  - gdown

  # ── pip (for torch 2.1.1 + RAM+ + DINOv2 deps) ─────────────────────
  - pip==24.0
  - pip:
      - setuptools==58.0.4

      # PyTorch 2.1.1 + cu121 — SmartWay README §Environment Setup.
      # Note: this DIFFERS from the ac-vlnce env (torch 1.9 + cu111).
      # Upstream specifies this exact combo; tested with habitat-sim 0.1.7
      # binary above (the .bz2 ships its own torch links).
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.1.1+cu121
      - torchvision==0.16.1+cu121
      - torchaudio==2.1.1

      # OpenCV / TensorBoard.
      # Pin <5: habitat-lab 0.1.7's maps.py uses
      # `cv2.applyColorMap(...).squeeze(1)`, broken by OpenCV 5.0 (unpinned
      # resolves to 5.x on fresh installs → `import habitat` ValueError).
      # Same fix as ac_vlnce.yaml (verified 2026-07-09, 4.8.1.78 + numpy 1.23.5).
      - opencv-python==4.8.1.78
      - tensorboard

      # VLN-CE specific (loaded by the depth encoder via vlnce_baselines)
      - dtw==1.4.0
      - fastdtw==0.3.4
      - gym==0.21
      - ifcfg
      - webdataset==0.1.103

      # SmartWay README dependencies
      - openai
      - tenacity
      - timm
      - fairscale

      # ── Recognize Anything (RAM+) ──
      # Same git source as opennav's RAM. RAM+ is a sibling model factory
      # in the same package (``from ram.models import ram_plus``).
      - git+https://github.com/xinyu1205/recognize-anything.git

      # ── Transformers for AutoImageProcessor (DINO preprocessing) ──
      # SmartWay base_il_trainer.py:356 uses transformers.AutoImageProcessor.
      # Pin to a 4.x version compatible with torch 2.1.1.
      - transformers>=4.36,<5.0

      # AgentCanvas backend client deps (server-mode nodeset talks HTTP).
      - fastapi[standard]>=0.115.0
      - uvicorn
      - httpx>=0.28.0
      - pydantic>=2.10.0
      - pydantic-settings>=2.6.0
      - python-dotenv>=1.0.1
      - litellm

      # NOTE: habitat-lab + VLN-CE are editable-installed by
      # install_ac_smartway.sh (Step 1b) with ABSOLUTE paths, NOT here. mamba
      # resolves relative pip paths ('-e third_party/...') against the pip
      # subprocess cwd — NOT the shell cwd, so the `cd $PROJECT_ROOT` in the
      # script does not help — and env-create fails with "... is not a valid
      # editable requirement" (verified on a fresh 20.04 host 2026-07-09).
      # Same fix already applied to ac_vlnce.yaml.
