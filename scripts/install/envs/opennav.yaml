name: opennav
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Dedicated env for Open-Nav scene perception (RAM Swin-L + SpatialBot-3B).
  # Holds the modern transformers stack required by SpatialBot's Phi-3 derivative
  # and the RAM tag-anything model. Does NOT touch habitat-sim (server-mode
  # nodeset talks to env_habitat over HTTP). The Open-Nav waypoint predictor
  # itself loads inside the existing `ac-vlnce` env (Python 3.8 + torch 2.4 +
  # habitat-sim 0.1.7) — see workspace/nodesets/server/opennav_waypoint.py.

  - python=3.10
  - pip
  - pytorch=2.4.*
  - pytorch-cuda=12.1
  - torchvision
  - torchaudio
  - cudatoolkit
  - numpy
  - pillow
  - scipy
  - tqdm

  - pip:
      # Modern HF stack required for SpatialBot-3B (Phi-3 derivative).
      - "transformers>=4.42"
      - accelerate
      - safetensors
      - sentencepiece
      - peft
      - bitsandbytes  # optional, for 4-bit / 8-bit SpatialBot loading
      - einops
      - timm

      # Recognize Anything (RAM Swin-L 14M tags) — installed from GitHub.
      - "git+https://github.com/xinyu1205/recognize-anything.git#egg=ram"

      # OpenAI-compatible LLM client (for parity with Open-Nav's llmClient).
      - openai
      - tenacity

      # Server-mode plumbing: pulls the AgentCanvas backend wheel deps so
      # AutoServerApp can host this nodeset.
      - fastapi
      - uvicorn
      - litellm
