name: ac-vlnce
channels:
  - aihabitat
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python version
  - python=3.8.15

  # C++ runtime (fixes CXXABI_1.3.15 compatibility)
  - libstdcxx-ng>=12.0.0

  # Habitat simulator (headless for server environments)
  - habitat-sim=0.1.7=py3.8_headless_linux_856d4b08c1a2632626bf0d205bf46471a99502b7

  # Core dependencies
  # numpy must be < 1.24 — habitat-sim 0.1.7 calls np.float
  # (habitat_sim/utils/common.py:84), removed in numpy 1.24. Watch out for
  # ~/.local/lib/python3.8/site-packages/numpy shadowing the env install:
  # if `python -c "import numpy; print(numpy.__file__)"` points at .local,
  # downgrade with `python -m pip install --user 'numpy<1.24'`.
  - numpy=1.23.5
  - scipy=1.10.1
  - networkx=3.1
  - tqdm
  - attrs
  - numba
  - imageio
  - imageio-ffmpeg

  # LMDB
  - lmdb
  - python-lmdb

  # Additional conda packages
  - quaternion
  - websockets
  - jsonlines
  - msgpack-numpy
  - yacs
  - gdown

  # Pip dependencies (only what's not available or needs specific versions)
  - pip==24.0 # essential to install gym 0.21
  - pip:
      # Pin setuptools for distutils.version compatibility with PyTorch 1.9
      - setuptools==58.0.4

      # PyTorch with CUDA 11.1 (for RTX 30xx / Ampere GPUs)
      - --extra-index-url https://download.pytorch.org/whl/cu111
      - torch==1.9.0+cu111
      - torchvision==0.10.0+cu111

      # Moved from conda to avoid conflicts.
      # Pin <5: habitat-lab 0.1.7's maps.py does
      # `cv2.applyColorMap(np.arange(246, uint8), ...).squeeze(1)`, which relies
      # on OpenCV 4.x returning a singleton axis-1. OpenCV 5.0 dropped it →
      # `import habitat` ValueError (squeeze). Unpinned resolves to 5.x on fresh
      # installs. Verified 2026-07-09 with 4.8.1.78 + numpy 1.23.5.
      - opencv-python==4.8.1.78
      - tensorboard
      - tensorflow-cpu==2.9.0 # Only for warning suppression, not computation

      # VLN-CE specific (not in conda)
      - dtw==1.4.0
      - fastdtw==0.3.4
      - gym==0.21
      - ifcfg

      # webdataset pinned for habitat-lab compatibility
      - webdataset==0.1.103

      - moviepy

      # Agent Web backend (FastAPI dashboard)
      - fastapi[standard]>=0.115.0
      - pydantic>=2.10.0
      - pydantic-settings>=2.6.0
      - python-dotenv>=1.0.1
      - httpx>=0.28.0

      # Development
      - pre-commit

      # NOTE: habitat-lab + VLN-CE are editable-installed by
      # install_ac_vlnce.sh (Step 2) with ABSOLUTE paths, NOT here. conda
      # resolves relative pip paths ('-e third_party/...') against the pip
      # subprocess cwd, which breaks on any machine that runs env-create from
      # a non-root dir (ERROR: "... is not a valid editable requirement").
      # The old '-e .' was also dropped: the repo root has no setup.py/
      # pyproject, so it never had a valid target.
