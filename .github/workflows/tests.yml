name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One run per ref; a newer push supersedes the in-flight one.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: agentcanvas/backend/requirements.txt

      # pillow unlocks the PIL serialization tests; the two torch-only
      # tests skip cleanly (torch is too heavy for CI and not needed —
      # the suite is framework-level, no models, no GPU).
      - name: Install backend deps
        run: |
          pip install -r agentcanvas/backend/requirements.txt
          pip install pytest pillow

      - name: Run backend unit tests
        run: python -m pytest -q
        working-directory: agentcanvas/backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Same ruff pin as .pre-commit-config.yaml; config comes from
      # ruff.toml at the repo root.
      - name: Ruff check
        run: |
          pip install ruff==0.15.7
          ruff check --no-fix agentcanvas/backend workspace
