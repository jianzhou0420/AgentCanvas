# Experiment harness profile for the mapgpt_mp3d graph.
# Read by /architect:experiment and /architect:debug.
# Schema: see .claude/commands/architect/_common/evaluator.md (profile block: split/worker_count/step_budget/per_step_budget_sec/metrics).
#
# Auto-generated by /architect:experiment 2026-04-30 — env_mp3d-aware defaults
# (mirrors navgpt_mp3d.exp.yaml since both share env_mp3d). Review and tune
# after observing iter_0 metrics.

# Eval-API parameters
split: val_unseen                # env_mp3d uses R2R-style splits
worker_count: 4                  # validated for env_mp3d (replicated mode); CLI override may push higher (unvalidated)
step_budget: 15                    # graph's authored step_budget is 50 internally; eval cap stays at 15 = navgpt parity for first comparable baseline
per_step_budget_sec: 120         # episode_timeout = step_budget × this = 1800s

# Metric handling
primary_metric: success          # drives trace.md headline + report verdict
secondary_metrics: [spl, nDTW, SDTW]  # exact env_mp3d casing — same as navgpt_mp3d

# Free-form rationale; lives here so the skill .md stays graph-agnostic.
rationale:
  step_budget: |
    Bootstrap value mirrors navgpt_mp3d (15) for first comparable baseline on
    val_unseen. MapGPT graph's internal step_budget=50 is the agent's
    reasoning-step cap; eval-side step_budget caps env transitions and is the
    one that drives episode_timeout. Re-evaluate after iter_0 — if trajectories
    consistently exceed 15 transitions and SR is still climbing, bump to 20-25.
  per_step_budget_sec: |
    120s mirrors navgpt_mp3d profile (validated 2026-04-27 for env_mp3d via
    navgpt baseline run c1e16d52: BLIP-2 caption dominated at p100 ~62s/step).
    MapGPT shares the env nodeset; LLM-side reasoning may push p95 higher due
    to topo-map prompt assembly — re-measure p95 from iter_0 log.jsonl and
    tune.
  worker_count: |
    Validated 2026-04-25 with 4 workers on env_mp3d (replicated mode). Profile
    pins worker_count=4 as the safe default; the iter_0 invocation overrides
    via --workers 10 (unvalidated — first stress test of env_mp3d at 10x
    parallel MatterSim subprocesses). If 10 workers OOM or thrash, fall back
    to 4 for subsequent iters.

# -----------------------------------------------------------------------------
# adas-subagent / aflow / myloop tier profiles
#   - two-tier baseline 2026-05-11
#   - three-tier search_ added 2026-05-20 (aflow)
#   - aflow reverted to two-tier 2026-05-25: search_ 30-ep stratified subset
#     misled the loop (iter_6 +13pp on search but -4pp on perf — see
#     outputs/design_runs/aflow/mapgpt_mp3d/v0/final_report.md). aflow now
#     ranks per-iter on perf_ directly; binomial SE drops 9pp→3.4pp.
# -----------------------------------------------------------------------------
# Required by /architect:{adas-subagent,aflow,myloop}:{loop,implementer,evaluator}:
#   smoke_<graph>:  cheap gate inside implementer's debug retry loop
#   perf_<graph>:   paper-comparable eval set. aflow runs perf_ EVERY iter as
#                   the ranking signal (no separate search_ tier); adas /
#                   myloop run it post-implementer for the final report.
# Flat fields above remain authoritative for non-tier skills.

smoke_mapgpt_mp3d:
  episode_count: 3
  worker_count: 3
  episode_indices: [0, 35, 70]            # deterministic; env_mp3d honors arbitrary episode_indices (verified 2026-05-20: eval_batch.py threads episode_indices[i] → MP3DController.set_episode)
  split: MapGPT72_first
  step_budget: 15
  per_step_budget_sec: 120                # episode_timeout = 1800s; same as perf for stability

perf_mapgpt_mp3d:
  episode_count: 216
  worker_count: 40                        # user override 2026-05-13: bumped 25→40 after 48-worker stress test (run 526634ba, 12min wall on 48 ep, peak 55GB/62GB RAM, 0 errors). 40 = 48 minus headroom for concurrent interactive backend / Vite. ~30min wall per 216-ep iter.
  split: MapGPT72                         # full 216-ep paper-canonical sampled subset
  step_budget: 15
  per_step_budget_sec: 120                # episode_timeout = 1800s; ~45min wall per iter
# perf_mapgpt_mp3d is the paper-comparable 216-ep eval AND aflow's per-iter
# ranking signal (post 2026-05-25 — see aflow/README.md § "Two-tier
# evaluation"). For myloop / adas, the eval-discipline rule in
# constraints/common.md (smoke lift ≥ 0.05 OR goal.md § Escalation
# authorization) gates invocation. ~$5 on gpt-5-mini, ~$26 on gpt-4o per run.
# aflow's 20-iter budget at gpt-5-mini ≈ $100, ~10h wall (+~2 verification
# reruns of top-1/2 post-loop).

# -----------------------------------------------------------------------------
# aflow-specific tunables (bootstrapped 2026-05-25 with upstream defaults
# per .claude/commands/architect/aflow/README.md § "Key tunables")
# -----------------------------------------------------------------------------
aflow:
  sample: 4                       # top-K parents for select_round (upstream DEFAULT_SAMPLE)
  alpha: 0.2                      # softmax temperature (upstream DEFAULT_ALPHA — note: paper Eq.3 says 0.4, code says 0.2; this port follows code)
  lambda_uniform: 0.3             # uniform-mix weight (upstream DEFAULT_LAMBDA — paper says 0.2, code says 0.3; this port follows code)
  replay_max_retries: 5           # soft cap on anti-replay loop (NEW vs upstream's unbounded while True)
  replay_norm: lower_ws           # "verbatim" | "lower_ws" | "embed" — see README §Q3
  convergence_z: 0.0              # top-k stability tolerance (upstream default; inert under F3 validation_rounds=1)
  convergence_top_k: 3            # convergence check window
  convergence_consecutive: 5      # consecutive rounds of stability required
