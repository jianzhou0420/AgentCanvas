# Experiment harness profile for the threestepnav_ce graph (Three-Step Nav VLN-CE port).
# Read by /architect:{experiment,…} tiers. Per memory feedback_experiment_run_ignores_expyaml,
# /experiment:run does NOT read this file — pass split/worker_count/step_budget/episode_count
# explicitly on the CLI. This file documents the canonical eval params.
#
# Upstream: github.com/ZoeyZheng0/3-step-Nav @ 5cdbdcf — R2R-CE val_unseen,
# the OpenNav_R2R-CE_100 subset, MAX_EPISODE_STEPS=8, model gpt-5. The graph
# pins the faithful config (gpt-5, rgb_resolution=1024, JPEG VLM bytes).
# Paper SR* 0.34; aligned-stack port SR* 0.24 @ 25 ep (compatible at n=25) —
# SR rulers differ between official VLN-CE and upstream, see the nodeset doc §4.1.

split: rand100              # verified identical to upstream's OpenNav_R2R-CE_100
                            # (same 100 episode_ids, same order)
worker_count: 4
step_budget: 8              # upstream MAX_EPISODE_STEPS (vlnce_task.yaml)
per_step_budget_sec: 240    # ~4 image-heavy gpt-5 calls/step + RAM/SpatialBot @ 1024 px

primary_metric: success
secondary_metrics: [spl, nDTW, oracle_success, nav_error]

rationale:
  port: |
    Three-Step Nav subclasses Open_Nav: it reuses env_habitat + opennav_waypoint
    (TRM) + opennav_perception (RAM + SpatialBot-3B), and adds the three-step
    reasoning — instruction decomposition, a MapGPT-style image navigator with
    folded completion estimation, and a continue/stay/backtrack/look-around
    judge driving a sub-instruction pointer. Single-version monolith (the
    Phase-2 decomposition was removed 2026-07-03); faithful model is gpt-5.

# -----------------------------------------------------------------------------
# adas-subagent / aflow / myloop tier profiles
# -----------------------------------------------------------------------------
smoke_threestepnav_ce:
  episode_count: 3
  worker_count: 1
  split: rand100
  step_budget: 8
  per_step_budget_sec: 240

perf_threestepnav_ce:
  episode_count: 100
  worker_count: 4
  split: rand100
  step_budget: 8
  per_step_budget_sec: 240
